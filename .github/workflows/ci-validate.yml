name: CI-CD

on:
  push:
    branches: [main, master]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ── 1. Validate ─────────────────────────────────────────────────────────────
  validate:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile app.py sidebar.py utils/loader.py utils/theme.py pages/0_Home.py pages/1_Personel.py pages/2_Analisis.py pages/3_Detail_Data.py

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Trivy filesystem scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: "0"

      - name: Upload Trivy SARIF to GitHub Security
        if: ${{ always() && hashFiles('trivy-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif

      - name: Trivy scan gate (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: "1"

  # ── 2. Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Image
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.vars.outputs.app_name }}
      image_ref: ${{ steps.vars.outputs.image_ref }}
      version: ${{ steps.vars.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image variables
        id: vars
        run: |
          VERSION_VALUE="$(cat VERSION | tr -d '[:space:]')"

          if [ -z "${VERSION_VALUE}" ]; then
            echo "version not found in VERSION file"
            exit 1
          fi

          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_REF="${IMAGE_REPO}:${VERSION_VALUE}"
          APP_NAME="${GITHUB_REPOSITORY##*/}"

          {
            echo "image_ref=${IMAGE_REF}"
            echo "app_name=${APP_NAME}"
            echo "version=${VERSION_VALUE}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.version }}

      - name: Build image (local, pre-scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ steps.vars.outputs.image_ref }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan (SARIF)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.vars.outputs.image_ref }}
          format: sarif
          output: trivy-image-results.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: "0"

      - name: Upload Trivy image SARIF to GitHub Security
        if: ${{ always() && hashFiles('trivy-image-results.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

      - name: Trivy image scan gate (HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: image
          image-ref: ${{ steps.vars.outputs.image_ref }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore
          exit-code: "1"

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha

  # ── 3. Update Manifest ─────────────────────────────────────────────────────
  update-manifest:
    name: Update K8s Manifest
    if: github.event_name != 'pull_request'
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
    steps:
      - name: Skip when token is unavailable
        if: ${{ env.MANIFEST_REPO_TOKEN == '' }}
        run: echo "MANIFEST_REPO_TOKEN is not set. Skipping manifest update."

      - name: Checkout manifest repo
        if: ${{ env.MANIFEST_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: HuntingYuk/k3s-manifest
          token: ${{ env.MANIFEST_REPO_TOKEN }}
          path: manifest-repo

      - name: Update image tags in all manifests
        if: ${{ env.MANIFEST_REPO_TOKEN != '' }}
        run: |
          TARGET_DIR="manifest-repo/projects/${APP_NAME}"

          if [ ! -d "${TARGET_DIR}" ]; then
            echo "project directory not found: ${TARGET_DIR}"
            exit 1
          fi

          # Update image tag di semua yaml files yang punya field image:
          for f in "${TARGET_DIR}"/*.yaml; do
            if grep -Eq '^\s*image:\s*' "$f"; then
              echo "Updating image in: $f"
              sed -E "s|^([[:space:]]*image:[[:space:]]*).*$|\\1${IMAGE_REF}|" "$f" > "$f.tmp"
              mv "$f.tmp" "$f"
            fi
          done
        env:
          APP_NAME: ${{ needs.build-and-push.outputs.app_name }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}

      - name: Commit and push manifest updates
        if: ${{ env.MANIFEST_REPO_TOKEN != '' }}
        run: |
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects
          if git diff --cached --quiet; then
            echo "No manifest changes detected"
            exit 0
          fi
          git commit -m "Update ${APP_NAME} deployment image to ${IMAGE_REF}"
          git push
        env:
          APP_NAME: ${{ needs.build-and-push.outputs.app_name }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}
