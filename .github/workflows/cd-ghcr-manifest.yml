name: CD GHCR + Manifest

on:
  workflow_run:
    workflows:
      - CI Validate
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' || github.event.workflow_run.head_branch == 'master'))
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.vars.outputs.app_name }}
      image_ref: ${{ steps.vars.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set image variables
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_REF="${IMAGE_REPO}:sha-${SHORT_SHA}"
          APP_NAME="${GITHUB_REPOSITORY##*/}"

          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.vars.outputs.image_ref }}
          labels: ${{ steps.meta.outputs.labels }}

  update-manifest:
    if: github.event_name != 'pull_request'
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      MANIFEST_REPO_TOKEN: ${{ secrets.MANIFEST_REPO_TOKEN }}
    steps:
      - name: Skip manifest update when token is unavailable
        if: ${{ env.MANIFEST_REPO_TOKEN == '' }}
        run: echo "MANIFEST_REPO_TOKEN is not set. Skipping manifest update job."

      - name: Checkout manifest repo
        if: ${{ env.MANIFEST_REPO_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: HuntingYuk/k3s-manifest
          token: ${{ env.MANIFEST_REPO_TOKEN }}
          path: manifest-repo

      - name: Update deployment image tag
        if: ${{ env.MANIFEST_REPO_TOKEN != '' }}
        run: |
          TARGET_DIR="manifest-repo/projects/${APP_NAME}"
          DEPLOY_FILE="${TARGET_DIR}/deployment.yaml"

          if [ ! -f "${DEPLOY_FILE}" ]; then
            echo "deployment file not found: ${DEPLOY_FILE}"
            exit 1
          fi

          if ! grep -Eq '^\s*image:\s*' "${DEPLOY_FILE}"; then
            echo "image field not found in ${DEPLOY_FILE}"
            exit 1
          fi

          sed -E "s|^([[:space:]]*image:[[:space:]]*).*$|\\1${IMAGE_REF}|" "${DEPLOY_FILE}" > "${DEPLOY_FILE}.tmp"
          mv "${DEPLOY_FILE}.tmp" "${DEPLOY_FILE}"
        env:
          APP_NAME: ${{ needs.build-and-push.outputs.app_name }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}

      - name: Commit and push manifest updates
        if: ${{ env.MANIFEST_REPO_TOKEN != '' }}
        run: |
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects
          if git diff --cached --quiet; then
            echo "No manifest changes detected"
            exit 0
          fi
          git commit -m "Update ${APP_NAME} deployment image to ${IMAGE_REF}"
          git push
        env:
          APP_NAME: ${{ needs.build-and-push.outputs.app_name }}
          IMAGE_REF: ${{ needs.build-and-push.outputs.image_ref }}